    <script>
        let dados = [];
        dados.push('A'); //posição 0
        dados.push('B'); //posição 1
        dados.push('C'); //posição 2

        for (i = 0; i < dados.length; i++) {
            alert("Elemento" + (i+1) + ": " + dados[i]);
        }

        let removido = dados.shift();
        alert ("Removido: " + removido);

        for (i = 0; i < dados.length; i++) {
            alert("Elemento" + (i+1) + ": " + dados[i]);
        }
    </script>
